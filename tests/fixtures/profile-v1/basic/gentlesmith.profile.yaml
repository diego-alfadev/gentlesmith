schemaVersion: 1
name: jarvis-portable
description: Portable Jarvis profile for coding agents.
capabilities:
  - id: context7
    type: mcp
    description: Fetch current library documentation through Context7.
    privacy: public
    targets: [codex, claude]
  - id: coolify-api
    type: tool
    description: Access Coolify deployment API through user-provided credentials.
    privacy: private
    env:
      - name: COOLIFY_TOKEN
        required: true
        secret: true
        description: Coolify API token referenced from the local environment.
    localPaths:
      - path: ~/.config/coolify/config.json
        required: false
        description: Optional local Coolify CLI config.
artifacts:
  - ref: artifacts/rules/safety.md
    exposure: embed
    overrides:
      markdown-managed-block:
        title: Operating Safety
  - ref: artifacts/workflows/coolify-deploy.md
    exposure: embed
  - ref: artifacts/skills/coolify-manager.md
    exposure: mention
  - ref: artifacts/capabilities/context7.md
    exposure: none
targets:
  codex:
    adapter: markdown-managed-block
